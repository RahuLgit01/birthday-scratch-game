<!doctype html>
<html lang="fr">
    <head>
        <meta name="google" content="notranslate">
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>♥Happy birthday overthinker</title>
        <link rel="stylesheet" href="styles.css">
        <script src="lib/createjs-2015.05.21.min.js"></script>
    </head>
    <body onload="init();">
        <a href="https://github.com/Ovski4/happy-birthday-scratch-game" id="github-ribbon">

                 src="https://camo.githubusercontent.com/8b6b8ccc6da3aa5722903da7b58eb5ab1081adee/68747470733a2f2f73332e616d617a6f6e6177732e636f6d2f6769746875622f726962626f6e732f666f726b6d655f6c6566745f6f72616e67655f6666373630302e706e67"

            >
        </a>
        <div class="smartphone-info">
            Try me on smartphone!
        </div>
        <header></header>
        <canvas id="canvas" width="320" height="320"></canvas>
        <div id="next">
            <button class="btn"> Yes Next!</button>
        </div>
        <p id="info">
            <span class="text">
                Scratch my guess about you behind this message<br>
                Why are you so cute.<br>
                4 correct guess and you win the corresponding gift!
            </span>
            <span class="cancel"></span>
        </p>
        <p id="message">Oh my gosh, Am i right na! Overthinker <br>You haven't won this kitten</p>
        <footer></footer>
